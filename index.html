<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>G & S Rule Animation</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:#020617;
  font-family:Georgia, serif;
}

/* BACKGROUND GLOW */

body::before{
  content:'';
  position:absolute;
  width:450px;
  height:450px;
  background:radial-gradient(circle,#1d4ed855,#00000000);
  border-radius:50%;
  filter:blur(40px);
}

/* CONTAINER */

.container{
  text-align:center;
  z-index:2;
}

/* LINE */

.line{
  display:flex;
  justify-content:center;
  gap:6px;
  margin:12px 0;
  flex-wrap:wrap;
}

/* LETTER STYLE */

.line span{
  font-size:65px;
  font-weight:bold;
  color:#ffffff;
  opacity:0;
  transform:translateY(-220px);
  animation:dropLetter .8s ease forwards;
  text-shadow:
    0 0 10px rgba(255,255,255,.7),
    0 0 20px rgba(255,255,255,.4);
}

/* GOLD LETTER */

.gold{
  color:#fbbf24 !important;
  text-shadow:
    0 0 12px rgba(251,191,36,.8),
    0 0 25px rgba(251,191,36,.6);
}

/* ANIMATION */

@keyframes dropLetter{

  0%{
    opacity:0;
    transform:translateY(-220px) scale(.5);
  }

  60%{
    opacity:1;
    transform:translateY(20px) scale(1.1);
  }

  100%{
    opacity:1;
    transform:translateY(0) scale(1);
  }

}

/* MOBILE */

@media(max-width:700px){

  .line span{
    font-size:40px;
  }

}

</style>
</head>
<body>

<div class="container">

  <!-- WELCOME -->

  <div class="line">

    <span style="animation-delay:0s;">W</span>
    <span style="animation-delay:0.1s;">e</span>
    <span style="animation-delay:0.2s;">l</span>
    <span style="animation-delay:0.3s;">c</span>
    <span style="animation-delay:0.4s;">o</span>
    <span style="animation-delay:0.5s;">m</span>
    <span style="animation-delay:0.6s;">e</span>

  </div>

  <!-- TO -->

  <div class="line">

    <span style="animation-delay:0.8s;">T</span>
    <span style="animation-delay:0.9s;">o</span>

  </div>

  <!-- G & S RULE -->

  <div class="line">

    <span class="gold" style="animation-delay:1.1s;">G</span>
    <span class="gold" style="animation-delay:1.2s;">&</span>
    <span class="gold" style="animation-delay:1.3s;">S</span>

    <span style="width:20px;"></span>

    <span class="gold" style="animation-delay:1.4s;">R</span>
    <span class="gold" style="animation-delay:1.5s;">u</span>
    <span class="gold" style="animation-delay:1.6s;">l</span>
    <span class="gold" style="animation-delay:1.7s;">e</span>

  </div>

</div>

</body>
</html>
